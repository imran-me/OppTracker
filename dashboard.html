<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Fonts: Plus Jakarta Sans (display), Inter (body), JetBrains Mono (numbers) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS + Bootstrap Icons (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Centralized stylesheet -->
  <link href="./assets/css/style.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg">
  <title>Dashboard · OppTrack</title>
</head>
<!-- data-page tells app.js which initializer to run -->
<body data-page="dashboard" class="app-shell viewer-mode">

  <!-- ============ Shared sidebar (rendered by app.js) ============ -->
  <aside id="sidebar" class="sidebar"></aside>

  <div class="main">
    <!-- ============ Shared topbar (rendered by app.js) ============ -->
    <header id="topbar" class="topbar"></header>

    <!-- ============ Page content ============ -->
    <div class="page-wrap">
      <!-- Summary cards (auto-calculated by app.js) -->
      <section class="mb-4">
        <div id="statGrid" class="stat-grid"></div>
      </section>

      <div class="grid-2 mb-4" style="grid-template-columns: 1.4fr 1fr;">
        <!-- Left column: deadline alerts + recent opportunities -->
        <div class="stack-16">
          <!-- Deadline Alert Widget (30 / 14 / 7 / 3-day colour thresholds) -->
          <div class="card card-pad">
            <div class="d-flex align-items-center mb-3">
              <div class="section-title mb-0">Deadline alerts</div>
              <a href="opportunities.html" class="ms-auto" style="font-size:12.5px">View all</a>
            </div>
            <div id="deadlineAlerts"></div>
          </div>

          <!-- Recent opportunities -->
          <div class="card table-card">
            <div class="card-head"><h3>Recent opportunities</h3>
              <a href="opportunities.html" class="ms-auto btn btn-ghost btn-sm">Open list</a>
            </div>
            <table class="dt">
              <thead><tr><th>Opportunity</th><th>Status</th><th>Deadline</th></tr></thead>
              <tbody id="recentOpps"></tbody>
            </table>
          </div>
        </div>

        <!-- Right column: notifications + calendar -->
        <div class="stack-16">
          <!-- Notifications panel -->
          <div class="card card-pad">
            <div class="section-title">Notifications</div>
            <div id="notifPanel" class="feed"></div>
          </div>

          <!-- Calendar widget (click a day to add a reminder) -->
          <div class="card card-pad">
            <div id="calendar"></div>
            <p class="text-faint mt-2 mb-0" style="font-size:11.5px"><i class="bi bi-info-circle me-1"></i>Click any date to add a reminder. Dots mark deadlines &amp; reminders.</p>
          </div>
        </div>
      </div>

      <!-- Quick actions (owner-only: each button opens a guarded add form) -->
      <div class="card card-pad owner-only">
        <div class="section-title">Quick actions</div>
        <div id="quickActions" class="qa-grid"></div>
      </div>
    </div><!-- /.page-wrap -->
  </div><!-- /.main -->

  <!-- Bootstrap bundle (modals, dropdowns) + centralized app engine -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Security layer MUST load before app.js so it can gate the page -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="./assets/js/firebase-config.js"></script>
  <script src="./assets/js/security.js"></script>
  <script src="./assets/js/app.js"></script>
</body>
</html>
