<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eon's Den</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{background:transparent;overflow:hidden;}
  #stage{position:fixed;inset:0;}
  #c{display:block;width:100%;height:100%;}
</style>
</head>
<body>
  <div id="stage"><canvas id="c"></canvas></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function(){
    "use strict";
    var P={ wood:0xb9895a, woodDark:0x8a6038, wall:0xf3f1ea, navy:0x12326a, royal:0x2f7be0,
            cyan:0x1fc8e0, green:0x86c83a, purple:0x7b63d8, cream:0xeef0f5, white:0xf8fafc,
            metal:0x3a4256, lampGlow:0xffd58a, screen:0x0f78dc };
    var stage=document.getElementById("c"),wrap=document.getElementById("stage");

    var renderer=new THREE.WebGLRenderer({canvas:stage,antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setClearColor(0x000000,0);
    renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    renderer.outputEncoding=THREE.sRGBEncoding;
    renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.05;

    var scene=new THREE.Scene();
    var camera=new THREE.PerspectiveCamera(34,1,0.1,200);

    scene.add(new THREE.HemisphereLight(0xffffff,0xdfe3ee,0.65));
    var sun=new THREE.DirectionalLight(0xfff2da,1.15);
    sun.position.set(7,12,6);sun.castShadow=true;
    sun.shadow.mapSize.set(2048,2048);
    var S=12;sun.shadow.camera.left=-S;sun.shadow.camera.right=S;sun.shadow.camera.top=S;sun.shadow.camera.bottom=-S;
    sun.shadow.camera.near=1;sun.shadow.camera.far=40;sun.shadow.bias=-0.0004;sun.shadow.radius=4;
    scene.add(sun);
    var winLight=new THREE.DirectionalLight(0xbfe0ff,0.35);winLight.position.set(0,4,-9);scene.add(winLight);
    var lamp=new THREE.PointLight(0xffcf8a,0.0,9,2);lamp.position.set(-3.0,2.0,2.4);scene.add(lamp);

    function mat(c,o){o=o||{};return new THREE.MeshStandardMaterial({color:c,
      roughness:o.r!=null?o.r:0.8,metalness:o.m!=null?o.m:0,emissive:o.e||0x000000,
      emissiveIntensity:o.ei||0,transparent:!!o.t,opacity:o.o!=null?o.o:1});}
    function box(w,h,d,m){var me=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);me.castShadow=true;me.receiveShadow=true;return me;}
    function cyl(rt,rb,h,m,seg){var me=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg||24),m);me.castShadow=true;me.receiveShadow=true;return me;}
    function put(p,o,x,y,z){o.position.set(x||0,y||0,z||0);p.add(o);return o;}
    function addOutlines(root,color){
      var ms=[];root.traverse(function(o){if(o.isMesh)ms.push(o);});
      ms.forEach(function(m){
        var mm=m.material;
        if(mm && mm.transparent && mm.opacity<0.99) return;
        var eg=new THREE.EdgesGeometry(m.geometry,28);
        var ls=new THREE.LineSegments(eg,new THREE.LineBasicMaterial({color:color,transparent:true,opacity:0.5}));
        ls.position.copy(m.position);ls.quaternion.copy(m.quaternion);ls.scale.copy(m.scale);
        m.parent.add(ls);
      });
    }

    function woodTex(){
      var w=512,h=512,cv=document.createElement("canvas");cv.width=w;cv.height=h;var g=cv.getContext("2d");
      g.fillStyle="#b9895a";g.fillRect(0,0,w,h);
      for(var i=0;i<8;i++){var y=i*h/8;
        g.fillStyle=i%2?"#b07e50":"#c0915f";g.fillRect(0,y,w,h/8);
        g.strokeStyle="rgba(90,60,30,.35)";g.lineWidth=2;g.beginPath();g.moveTo(0,y);g.lineTo(w,y);g.stroke();
        for(var k=0;k<24;k++){g.strokeStyle="rgba(120,85,50,.18)";g.beginPath();
          var yy=y+Math.random()*h/8;g.moveTo(Math.random()*w,yy);g.lineTo(Math.random()*w,yy+(Math.random()*8-4));g.stroke();}
      }
      var t=new THREE.CanvasTexture(cv);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(2,2);t.anisotropy=4;return t;
    }
    function emblem(bg,fg){var s=256,cv=document.createElement("canvas");cv.width=cv.height=s;var g=cv.getContext("2d");
      if(bg){g.fillStyle=bg;g.fillRect(0,0,s,s);}g.strokeStyle=fg;g.lineWidth=16;g.beginPath();g.arc(s/2,s/2,s/2-26,0,7);g.stroke();
      g.fillStyle=fg;g.font="700 150px Georgia,serif";g.textAlign="center";g.textBaseline="middle";g.fillText("e",s/2,s/2+8);
      return new THREE.CanvasTexture(cv);}
    function screenTex(){var w=320,h=200,cv=document.createElement("canvas");cv.width=w;cv.height=h;var g=cv.getContext("2d");
      var gr=g.createLinearGradient(0,0,0,h);gr.addColorStop(0,"#0f78dc");gr.addColorStop(1,"#0b4fa0");g.fillStyle=gr;g.fillRect(0,0,w,h);
      g.fillStyle="rgba(255,255,255,.92)";g.font="700 70px Georgia,serif";g.textAlign="center";g.textBaseline="middle";g.fillText("e",w*0.22,h*0.5);
      g.fillStyle="rgba(255,255,255,.85)";for(var i=0;i<5;i++)g.fillRect(w*0.4,30+i*30,w*0.45*(0.6+0.4*Math.random()),10);
      var t=new THREE.CanvasTexture(cv);return t;}

    var room=new THREE.Group();scene.add(room);
    var floor=box(8,0.3,8,new THREE.MeshStandardMaterial({map:woodTex(),roughness:0.7}));
    floor.position.y=-0.15;floor.receiveShadow=true;room.add(floor);
    var WALL_BASE=1.35, WALL_THICK=0.2;
    function wavyTop(x){ return WALL_BASE+0.16*Math.sin(x*1.05+0.6)+0.085*Math.sin(x*2.6+1.2)+0.05*Math.sin(x*4.7+0.2); }
    function wavyWall(len){
      var sh=new THREE.Shape();
      sh.moveTo(-len/2,0); sh.lineTo(len/2,0);
      var N=72;
      for(var i=0;i<=N;i++){var x=len/2 - i*(len/N); sh.lineTo(x, wavyTop(x));}
      sh.lineTo(-len/2,0);
      var geo=new THREE.ExtrudeGeometry(sh,{depth:WALL_THICK,bevelEnabled:false});
      geo.translate(0,0,-WALL_THICK/2);
      var m=new THREE.Mesh(geo,mat(P.wall,{r:0.95}));
      m.castShadow=true;m.receiveShadow=true;return m;
    }
    var backW=wavyWall(8); backW.position.set(0,0,-3.9); room.add(backW);
    put(room,box(8,0.55,0.06,mat(P.navy,{r:0.8})),0,0.275,-3.78);
    var leftW=wavyWall(8); leftW.rotation.y=Math.PI/2; leftW.position.set(-3.9,0,0); room.add(leftW);
    put(room,box(0.06,0.55,8,mat(P.navy,{r:0.8})),-3.78,0.275,0);
    var win=new THREE.Group();room.add(win);
    put(win,box(1.5,0.55,0.05,mat(0xbfe6ff,{e:0xbfe6ff,ei:0.55,r:0.2})),1.4,0.92,-3.77);
    put(win,box(1.66,0.1,0.12,mat(P.white,{r:0.6})),1.4,1.22,-3.76);
    put(win,box(1.66,0.1,0.12,mat(P.white,{r:0.6})),1.4,0.62,-3.76);
    put(win,box(0.1,0.62,0.12,mat(P.white,{r:0.6})),1.4,0.92,-3.76);
    var em=new THREE.Mesh(new THREE.PlaneGeometry(0.7,0.7),new THREE.MeshStandardMaterial({map:emblem(null,"#86c83a"),transparent:true,roughness:0.9}));
    em.position.set(-3.77,0.9,-1.3);em.rotation.y=Math.PI/2;room.add(em);
    var rug=cyl(2.0,2.0,0.04,mat(P.navy,{r:0.9}),48);put(room,rug,0.2,0.02,0.6);
    put(room,cyl(1.6,1.6,0.05,mat(P.green,{r:0.9}),48),0.2,0.025,0.6);
    put(room,cyl(1.2,1.2,0.06,mat(P.navy,{r:0.9}),48),0.2,0.03,0.6);
    put(room,cyl(0.7,0.7,0.07,mat(P.cyan,{r:0.8}),48),0.2,0.035,0.6);

    var bed=new THREE.Group();bed.position.set(2.1,0,-2.4);room.add(bed);
    put(bed,box(1.8,0.45,2.9,mat(P.woodDark,{r:0.7})),0,0.22,0);
    put(bed,box(1.7,0.28,2.7,mat(P.cream,{r:0.9})),0,0.5,0);
    put(bed,box(1.74,0.18,1.7,mat(P.royal,{r:0.85})),0,0.62,0.45);
    put(bed,box(1.5,0.22,0.5,mat(P.white,{r:0.9})),0,0.66,-1.05);
    put(bed,box(1.85,1.0,0.2,mat(P.navy,{r:0.7})),0,0.62,-1.45);

    var chair=new THREE.Group();chair.position.set(-2.0,0,1.2);room.add(chair);
    put(chair,box(1.2,0.45,1.1,mat(P.green,{r:0.85})),0,0.42,0);
    put(chair,box(1.1,0.35,1.0,mat(0x9bd84a,{r:0.8})),0,0.7,0);
    put(chair,box(1.2,1.0,0.3,mat(P.green,{r:0.85})),0,0.95,-0.5);
    put(chair,box(0.25,0.6,1.0,mat(P.green,{r:0.85})),0.62,0.7,0);
    put(chair,box(0.25,0.6,1.0,mat(P.green,{r:0.85})),-0.62,0.7,0);
    [[0.5,0.5],[-0.5,0.5],[0.5,-0.5],[-0.5,-0.5]].forEach(function(p){
      put(chair,cyl(0.06,0.05,0.4,mat(P.woodDark,{r:0.6}),12),p[0],0.2,p[1]);});

    var st=new THREE.Group();st.position.set(-3.2,0,1.0);room.add(st);
    put(st,cyl(0.45,0.45,0.1,mat(P.woodDark,{r:0.6}),28),0,0.78,0);
    put(st,cyl(0.06,0.06,0.78,mat(P.metal,{m:0.6,r:0.4}),16),0,0.39,0);
    var cup=new THREE.Group();st.add(cup);cup.position.set(0,0.9,0);
    put(cup,cyl(0.12,0.1,0.16,mat(P.white,{r:0.4}),24),0,0,0);
    put(cup,new THREE.Mesh(new THREE.TorusGeometry(0.06,0.02,10,20),mat(P.white,{r:0.4})),0.14,0,0).rotation.y=Math.PI/2;
    var steam=[];for(var i=0;i<3;i++){var sp=new THREE.Mesh(new THREE.SphereGeometry(0.03,10,10),mat(P.white,{t:1,o:0.5,r:0.9}));put(cup,sp,(i-1)*0.04,0.13,0);steam.push(sp);}
    var lampG=new THREE.Group();lampG.position.set(-3.4,0,2.7);room.add(lampG);
    put(lampG,cyl(0.22,0.26,0.06,mat(P.metal,{m:0.6,r:0.4}),20),0,0.03,0);
    put(lampG,cyl(0.04,0.04,2.0,mat(P.metal,{m:0.6,r:0.4}),12),0,1.0,0);
    var shade=put(lampG,cyl(0.34,0.24,0.4,mat(P.cream,{e:P.lampGlow,ei:0.0,r:0.7,t:1,o:0.95}),24),0,2.1,0);

    var desk=new THREE.Group();desk.position.set(2.0,0,1.9);room.add(desk);
    put(desk,box(2.0,0.12,0.95,mat(P.wood,{r:0.6})),0,1.1,0);
    [[0.9,0.38],[-0.9,0.38],[0.9,-0.38],[-0.9,-0.38]].forEach(function(p){
      put(desk,box(0.1,1.1,0.1,mat(P.woodDark,{r:0.6})),p[0],0.55,p[1]);});
    var lap=new THREE.Group();desk.add(lap);lap.position.set(0,1.17,0.06);
    put(lap,box(0.7,0.04,0.46,mat(P.metal,{m:0.5,r:0.4})),0,0,0);
    put(lap,box(0.6,0.006,0.3,mat(0x202838,{r:0.5})),0,0.025,0.02);
    var scr=put(lap,box(0.7,0.46,0.03,mat(0x10151f,{r:0.4})),0,0.22,-0.2);scr.rotation.x=0.4;
    var screenMesh=new THREE.Mesh(new THREE.PlaneGeometry(0.62,0.4),
      new THREE.MeshStandardMaterial({map:screenTex(),emissive:0xffffff,emissiveMap:screenTex(),emissiveIntensity:0.9,roughness:0.3}));
    put(scr,screenMesh,0,0,0.02);
    var stool=new THREE.Group();stool.position.set(2.0,0,0.85);room.add(stool);
    put(stool,cyl(0.42,0.42,0.14,mat(P.royal,{r:0.7}),28),0,0.85,0);
    put(stool,cyl(0.05,0.05,0.85,mat(P.metal,{m:0.6,r:0.4}),16),0,0.42,0);
    put(stool,cyl(0.3,0.3,0.05,mat(P.metal,{m:0.6,r:0.4}),20),0,0.05,0);

    var plant=new THREE.Group();plant.position.set(3.2,0,2.9);room.add(plant);
    put(plant,cyl(0.28,0.22,0.4,mat(P.purple,{r:0.6}),20),0,0.2,0);
    put(plant,cyl(0.04,0.05,0.5,mat(P.green,{r:0.6}),10),0,0.6,0);
    function leaf(x,rz){var l=new THREE.Mesh(new THREE.SphereGeometry(0.18,16,16),mat(P.green,{r:0.6}));
      l.scale.set(0.5,1.1,0.28);l.position.set(x,0.85,0);l.rotation.z=rz;l.castShadow=true;plant.add(l);return l;}
    var lf1=leaf(-0.12,0.6),lf2=leaf(0.12,-0.6);

    var shelf=new THREE.Group();shelf.position.set(-1.1,0,-3.74);room.add(shelf);
    put(shelf,box(1.2,1.8,0.3,mat(P.woodDark,{r:0.7})),0,0.9,0);
    for(var sY=0;sY<3;sY++){var by=0.5+sY*0.5;
      for(var bx=0;bx<5;bx++){var cols=[P.royal,P.green,P.purple,P.cyan,P.navy];
        put(shelf,box(0.12,0.34,0.22,mat(cols[(bx+sY)%5],{r:0.7})),-0.45+bx*0.22,by,0.06);}}

    [bed,chair,st,lampG,desk,stool,plant,shelf].forEach(function(g){addOutlines(g,0x232b3c);});

    // calm fixed-ish camera with a very slow drift
    var target=new THREE.Vector3(0.2,0.85,0.6);
    var az=0.5,pol=0.95,dist=14;
    function applyCam(){
      var x=target.x+dist*Math.sin(pol)*Math.sin(az);
      var y=target.y+dist*Math.cos(pol);
      var z=target.z+dist*Math.sin(pol)*Math.cos(az);
      camera.position.set(x,y,z);camera.lookAt(target);
    }

    var clock=new THREE.Clock();
    function animate(){
      requestAnimationFrame(animate);
      var t=clock.getElapsedTime(),dt=clock.getDelta();
      az+=dt*0.04;applyCam();                                  // gentle slow drift
      screenMesh.material.emissiveIntensity=0.8+Math.sin(t*9)*0.06+Math.sin(t*3.3)*0.05;
      lamp.intensity=0.55+Math.sin(t*1.6)*0.06;shade.material.emissiveIntensity=0.5+Math.sin(t*1.6)*0.05;
      for(var k=0;k<steam.length;k++){var sp=steam[k];sp.position.y=0.13+((t*0.4+k*0.33)%0.5);sp.material.opacity=0.5*(1-((t*0.4+k*0.33)%0.5)/0.5);}
      lf1.rotation.x=Math.sin(t*1.2)*0.06;lf2.rotation.x=Math.sin(t*1.2+0.5)*0.06;
      renderer.render(scene,camera);
    }
    function resize(){var w=wrap.clientWidth,h=wrap.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
    window.addEventListener("resize",resize);resize();applyCam();animate();
  })();
  </script>
</body>
</html>
