<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Fonts: Plus Jakarta Sans (display), Inter (body), JetBrains Mono (numbers) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS + Bootstrap Icons (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Centralized stylesheet -->
  <link href="./assets/css/style.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg">
  <title>Achievements · OppTrack</title>
</head>
<!-- data-page tells app.js which initializer to run -->
<body data-page="achievements" class="app-shell viewer-mode">

  <!-- ============ Shared sidebar (rendered by app.js) ============ -->
  <aside id="sidebar" class="sidebar"></aside>

  <div class="main">
    <!-- ============ Shared topbar (rendered by app.js) ============ -->
    <header id="topbar" class="topbar"></header>

    <!-- ============ Page content ============ -->
    <div class="page-wrap">
      <div class="toolbar">
        <div class="grow"></div>
        <button class="btn btn-primary owner-only" id="achAdd"><i class="bi bi-plus-lg me-1"></i>Add achievement</button>
      </div>
      <!-- Achievement gallery rendered by app.js -->
      <div id="achHost"></div>
    </div><!-- /.page-wrap -->
  </div><!-- /.main -->

  <!-- Bootstrap bundle (modals, dropdowns) + centralized app engine -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Security layer MUST load before app.js so it can gate the page -->
  <script src="./assets/js/security.js"></script>
  <script src="./assets/js/app.js"></script>
</body>
</html>
